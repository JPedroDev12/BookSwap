<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="login.css">
<title>BookSwap – Entrar</title>
</head>

<body>

<!-- Navegação -->

    <nav>
        <a href="#" class="logo">
            <img src="img/Logo.png" alt="Logo BookSwap" class="logo-icon">
            <h3>Book Swap</h3>
        </a>
        <div class="nav-links">
            <button class="btn-Loja">Loja</button>
            <button class="btn-Swapping">Swapping</button>
            <button class="btn-entrar">Entrar</button>
        </div>
    </nav>

<!-- Login container -->

    <main class="login-container">
        <header class="login-header">
            <img src="img/Logo.png" alt="BookSwap Logo" class="logo-mini">
            <span class="brand-name">BookSwap</span>
            <h1>Entrar</h1>
        </header>

        <form>
            <div class="input-group">
                <label for="email" class="sr-only">Email</label>
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <label for="password" class="sr-only">Senha</label>
<input type="password" id="password" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-submit">Entrar</button>
        </form>
    </main>
</body>

</html>
